 오르면 대출 이자가 오르기 쉽고, 돈을 빌리기 부담스러워져 소비와 투자가 줄 수 있어요.",example:"기준금리가 오르면 변동금리 대출을 가진 사람의 월 이자가 늘 수 있어요."},환율:{aliases:["원달러","달러원"],short:"한 나라 돈을 다른 나라 돈으로 바꿀 때의 가격이에요.",detail:"원달러 환율이 오르면 같은 1달러를 사기 위해 더 많은 원화가 필요해요.",example:"환율이 오르면 해외여행과 수입품 가격이 비싸질 수 있어요."},물가상승률:{aliases:["인플레이션"],short:"상품과 서비스 가격이 얼마나 올랐는지를 보여주는 비율이에요.",detail:"물가상승률이 높으면 같은 월급으로 살 수 있는 물건이 줄어드는 느낌을 받을 수 있어요.",example:"물가상승률이 3%라면 작년 10,000원 물건이 올해 10,300원 정도가 된 셈이에요."},소비자물가지수:{aliases:["CPI"],short:"가계가 자주 사는 물건과 서비스 가격 변화를 모아 만든 지표예요.",detail:"식료품, 교통, 통신, 외식 등 생활과 가까운 가격을 묶어서 물가 흐름을 보여줘요.",example:"CPI가 예상보다 높으면 중앙은행이 금리를 내리기 어려워질 수 있어요."},코스피:{aliases:["KOSPI"],short:"한국 대표 주식시장에 상장된 큰 기업들의 주가 흐름을 보여주는 지수예요.",detail:"삼성전자 같은 대형 기업의 움직임이 코스피에 큰 영향을 줘요.",example:"코스피가 올랐다는 말은 한국 대표 주식들이 전반적으로 강했다는 뜻이에요."},코스닥:{aliases:["KOSDAQ"],short:"성장 기업과 중소형 기술 기업이 많이 모인 한국 주식시장이에요.",detail:"바이오, 게임, 2차전지처럼 성장 기대가 큰 업종의 변동성이 자주 나타나요.",example:"코스닥은 코스피보다 오르내림이 더 클 때가 많아요."},국채:{aliases:["국고채"],short:"정부가 돈을 빌리기 위해 발행하는 채권이에요.",detail:"정부가 이자를 약속하고 돈을 빌리는 증서라서 비교적 안전한 자산으로 여겨져요.",example:"국채금리가 오르면 주식 같은 위험자산이 부담을 받을 수 있어요."},국채금리:{aliases:["채권금리"],short:"정부 채권에 투자했을 때 기대할 수 있는 수익률이에요.",detail:"국채금리가 오르면 시장 전체 금리의 눈높이도 함께 올라가는 경우가 많아요.",example:"미국 국채금리가 오르면 전 세계 주식시장이 흔들릴 수 있어요."},영업이익:{short:"기업이 본업으로 벌어들인 이익이에요.",detail:"제품 판매나 서비스 제공 같은 핵심 사업에서 남긴 돈이라 기업 체력을 볼 때 중요해요.",example:"매출이 늘어도 비용이 더 크게 늘면 영업이익은 줄 수 있어요."},긴축:{aliases:["통화긴축"],short:"금리를 올리거나 돈의 흐름을 줄여 과열된 경제를 식히는 정책이에요.",detail:"물가가 너무 빨리 오를 때 중앙은행이 긴축을 통해 소비와 투자를 천천히 만들 수 있어요.",example:"긴축이 길어지면 대출 부담이 커지고 주식시장에는 부담이 될 수 있어요."},완화:{aliases:["통화완화"],short:"금리를 낮추거나 돈의 흐름을 늘려 경제를 살리는 정책이에요.",detail:"경기가 약할 때 대출과 투자를 쉽게 만들어 소비를 돕는 방향이에요.",example:"완화 기대가 커지면 성장주가 좋아지는 경우가 있어요."},유동성:{short:"시장에 돈이 얼마나 잘 돌고 있는지를 뜻해요.",detail:"유동성이 풍부하면 투자와 소비가 활발해지기 쉽고, 줄어들면 시장이 위축될 수 있어요.",example:"유동성이 줄면 기업이 돈을 구하기 어려워질 수 있어요."},외국인순매수:{aliases:["외국인 순매수"],short:"외국인 투자자가 판 주식보다 산 주식이 더 많다는 뜻이에요.",detail:"외국인의 매수세는 대형주와 지수 흐름에 큰 영향을 줄 때가 많아요.",example:"외국인 순매수가 늘면 코스피가 힘을 받을 수 있어요."},PER:{aliases:["주가수익비율"],short:"주가가 기업 이익에 비해 비싼지 보는 지표예요.",detail:"PER이 높으면 미래 성장 기대가 크거나, 현재 이익 대비 주가가 비싸다는 뜻일 수 있어요.",example:"PER 10배는 1년 이익의 10배 가격으로 회사가 평가된다는 뜻이에요."},ROE:{aliases:["자기자본이익률"],short:"회사가 자기 돈으로 얼마나 효율적으로 이익을 냈는지 보는 지표예요.",detail:"ROE가 높으면 같은 자본으로 더 많은 이익을 내는 회사라고 볼 수 있어요.",example:"ROE 15%는 자기자본 100원으로 15원의 이익을 냈다는 뜻이에요."},EPS:{aliases:["주당순이익"],short:"주식 한 주당 회사가 벌어들인 순이익이에요.",detail:"EPS가 늘면 회사의 이익 체력이 좋아졌다고 볼 수 있어요.",example:"EPS가 오르면 주가도 긍정적으로 반응할 가능성이 있어요."},배당:{aliases:["배당금"],short:"회사가 번 돈의 일부를 주주에게 나눠주는 것이에요.",detail:"배당은 주가 차익과 별개로 주주가 받는 현금 수익이에요.",example:"배당이 늘면 안정적인 현금흐름을 원하는 투자자에게 매력적일 수 있어요."},주주환원:{short:"회사가 주주에게 이익을 돌려주는 활동이에요.",detail:"배당을 늘리거나 자사주를 사들이는 방식이 대표적이에요.",example:"주주환원 확대 발표 후 주가가 오르는 경우가 있어요."},자사주:{short:"회사가 자기 회사 주식을 직접 사서 보유하는 주식이에요.",detail:"자사주 매입은 시장에 유통되는 주식 수를 줄여 주가에 긍정적일 수 있어요.",example:"회사가 자사주를 소각하면 남은 주식의 가치가 높아질 수 있어요."},매출:{short:"기업이 제품이나 서비스를 팔아 벌어들인 전체 돈이에요.",detail:"매출은 규모를 보여주지만, 비용을 빼기 전이라 이익과는 달라요.",example:"매출은 늘었지만 비용이 더 늘면 이익은 줄 수 있어요."},부채비율:{short:"회사가 자기자본에 비해 빚을 얼마나 가지고 있는지 보여주는 비율이에요.",detail:"부채비율이 너무 높으면 금리 상승기에 이자 부담이 커질 수 있어요.",example:"부채비율이 낮은 회사는 경기 침체 때 버틸 힘이 상대적으로 좋을 수 있어요."},신용스프레드:{short:"안전한 채권과 위험한 채권의 금리 차이예요.",detail:"차이가 벌어지면 투자자들이 위험을 더 크게 느낀다는 신호일 수 있어요.",example:"신용스프레드가 커지면 기업 자금 조달이 어려워질 수 있어요."},양적완화:{aliases:["QE"],short:"중앙은행이 채권을 사들여 시장에 돈을 푸는 정책이에요.",detail:"금리만으로 경기를 살리기 어려울 때 유동성을 직접 늘리는 방식이에요.",example:"양적완화가 시작되면 시장에 돈이 늘어 자산 가격이 오를 수 있어요."},테이퍼링:{short:"중앙은행이 돈을 푸는 속도를 서서히 줄이는 일이에요.",detail:"양적완화를 갑자기 멈추면 시장 충격이 크기 때문에 조금씩 줄이는 방식을 써요.",example:"테이퍼링 소식에 투자자들이 유동성 감소를 걱정할 수 있어요."},가계부채:{short:"가계가 은행이나 금융기관에서 빌린 돈이에요.",detail:"가계부채가 많으면 금리가 오를 때 소비 여력이 빠르게 줄 수 있어요.",example:"가계부채가 늘면 중앙은행은 금리 인하에 더 조심스러울 수 있어요."},실질임금:{short:"물가 변화를 반영한 실제 구매력 기준의 임금이에요.",detail:"월급이 올라도 물가가 더 많이 오르면 실질임금은 줄어든 것처럼 느껴져요.",example:"실질임금이 줄면 소비가 약해질 수 있어요."},가처분소득:{short:"세금과 필수 지출을 빼고 실제로 쓸 수 있는 돈이에요.",detail:"가처분소득이 줄면 외식, 여행, 쇼핑 같은 선택 소비가 줄어들 수 있어요.",example:"대출 이자가 늘면 가처분소득이 줄어드는 효과가 있어요."},소비심리:{short:"사람들이 앞으로 돈을 쓰려는 마음이 얼마나 강한지 보여주는 분위기예요.",detail:"소비심리가 나빠지면 기업 매출과 경기 흐름에도 부담이 생길 수 있어요.",example:"물가 부담이 커지면 소비심리가 위축될 수 있어요."},원자재:{short:"제품을 만들 때 필요한 기본 재료예요.",detail:"석유, 철광석, 구리, 곡물 같은 원자재 가격은 기업 비용과 물가에 영향을 줘요.",example:"원자재 가격이 오르면 식품이나 공산품 가격도 오를 수 있어요."},무역수지:{short:"수출한 금액에서 수입한 금액을 뺀 값이에요.",detail:"수출이 수입보다 많으면 흑자, 적으면 적자라고 해요.",example:"무역수지가 나빠지면 환율에 부담이 될 수 있어요."},경상수지:{short:"나라가 해외와 거래해서 벌고 쓴 돈의 종합 성적표예요.",detail:"상품 거래뿐 아니라 서비스, 이자, 배당 같은 돈 흐름까지 포함해요.",example:"경상수지 흑자는 나라 밖에서 들어오는 돈이 많다는 뜻이에요."},고용지표:{short:"취업자 수, 실업률처럼 일자리 상황을 보여주는 숫자예요.",detail:"고용이 강하면 소비가 버틸 가능성이 커지고, 중앙은행의 금리 판단에도 영향을 줘요.",example:"미국 고용지표가 강하면 금리 인하 기대가 줄어들 수 있어요."},실업률:{short:"일할 의사가 있지만 일자리를 찾지 못한 사람의 비율이에요.",detail:"실업률이 높아지면 가계 소비와 경기 흐름이 약해질 수 있어요.",example:"실업률이 크게 오르면 정부가 경기 부양책을 검토할 수 있어요."},GDP:{aliases:["국내총생산"],short:"한 나라 안에서 일정 기간 만들어낸 상품과 서비스의 총액이에요.",detail:"경제 규모와 성장 속도를 볼 때 가장 많이 쓰는 지표예요.",example:"GDP 성장률이 둔화되면 경기 침체 우려가 커질 수 있어요."},경기침체:{short:"경제 활동이 전반적으로 줄어드는 상태예요.",detail:"기업 매출, 고용, 소비가 함께 약해질 때 경기침체라는 말을 써요.",example:"경기침체가 오면 기업은 채용과 투자를 줄일 수 있어요."},경기부양:{short:"정부나 중앙은행이 경기를 살리기 위해 쓰는 정책이에요.",detail:"금리 인하, 세금 감면, 재정 지출 확대 등이 대표적인 방식이에요.",example:"경기부양책이 나오면 건설과 소비 관련 업종이 관심을 받을 수 있어요."},재정정책:{short:"정부가 세금과 지출을 조절해 경제에 영향을 주는 정책이에요.",detail:"정부가 돈을 더 쓰면 경기를 돕지만, 재정 부담이 커질 수 있어요.",example:"재정정책이 확대되면 공공사업 관련 기업이 혜택을 볼 수 있어요."},통화정책:{short:"중앙은행이 금리와 돈의 양을 조절하는 정책이에요.",detail:"물가와 경기를 안정시키기 위해 기준금리, 유동성 공급 등을 조정해요.",example:"통화정책 회의 결과는 환율과 주식시장에 바로 영향을 줄 수 있어요."},채권:{short:"정부나 기업이 돈을 빌리고 이자를 약속하며 발행하는 증서예요.",detail:"채권 가격과 금리는 보통 반대로 움직여요.",example:"금리가 오르면 기존 채권 가격은 떨어질 수 있어요."},회사채:{short:"기업이 돈을 빌리기 위해 발행하는 채권이에요.",detail:"기업의 신용도가 낮을수록 더 높은 이자를 줘야 투자자를 모을 수 있어요.",example:"회사채 금리가 오르면 기업의 자금 조달 비용이 커져요."},ETF:{short:"주식처럼 사고팔 수 있는 펀드예요.",detail:"특정 지수나 업종을 따라가도록 만들어져 분산투자에 자주 쓰여요.",example:"코스피200 ETF를 사면 여러 대형주에 나누어 투자하는 효과가 있어요."},공매도:{short:"주가 하락을 예상하고 빌린 주식을 먼저 파는 투자 방식이에요."
